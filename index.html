<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" id="favicon-el">
<title>D2R 符文之語追蹤器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
:root{
  --bg:#0c0e12;--bg2:#131720;--bg3:#1a1f2e;--bg4:#222840;
  --b1:#2a3050;--b2:#3a4268;
  --acc:#4a78c8;--ac2:#6a9af0;--ac3:#9abcff;
  --tx:#c8d4e8;--tx2:#8898b8;--tx3:#b8c3d9;
  --red:#c05050;--grn:#3a7050;--gr2:#5aaa78;
  --lad:#9060c8;--la2:#b888f0;
  --nld:rgb(231,52,52);--nl2:rgb(255,100,100);
  --run:#ebc862;--ru2:#e8c068;
  --done-bg:#0e1e16;--done-bd:#2a5a38;
  --sh:0 4px 24px rgba(0,0,0,.7);
  --fs:15px; /* base font size */
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans TC',sans-serif;font-size:var(--fs);min-height:100vh;
  background-image:radial-gradient(ellipse at 10% 0%,rgba(74,120,200,.06) 0%,transparent 50%),radial-gradient(ellipse at 90% 100%,rgba(90,96,200,.05) 0%,transparent 50%)}

/* ── HEADER ── */
header{background:linear-gradient(180deg,#0a0d18 0%,var(--bg) 100%);border-bottom:1px solid var(--b2);
  padding:11px 18px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 16px rgba(0,0,0,.6);flex-wrap:wrap}
h1{font-family:'Cinzel',serif;font-size:20px;color:var(--ac2);letter-spacing:.08em;
  text-shadow:0 0 20px rgba(74,120,200,.5);flex-shrink:0}
.dv{color:var(--b2);font-size:18px}
.stats{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.st{display:flex;flex-direction:column;align-items:center;gap:1px}
.st-l{font-size:11px;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em}
.st-v{font-size:17px;font-weight:700;color:var(--ac2);font-family:'Cinzel',serif}
.st-v.d{color:var(--gr2)}.st-v.n{color:#e07050}
.hbtn{padding:6px 13px;border-radius:3px;cursor:pointer;font-size:13px;
  font-family:'Noto Sans TC',sans-serif;transition:all .13s;white-space:nowrap}
.exp{background:var(--bg3);border:1px solid var(--b2);color:var(--ac2)}
.exp:hover{background:var(--acc);color:#fff;border-color:var(--ac2)}
.imp{background:var(--bg3);border:1px solid var(--b2);color:var(--gr2)}
.imp:hover{background:var(--grn);color:#fff;border-color:var(--gr2)}
.rst{background:transparent;border:1px solid var(--red);color:var(--red);margin-left:auto}
.rst:hover{background:var(--red);color:#fff}

/* ── LAYOUT ── */
.wrap{display:flex;height:calc(100vh - 58px);overflow:hidden}

/* ── SIDEBAR ── */
aside{width:250px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--b1);
  overflow-y:auto;padding:11px;display:flex;flex-direction:column;gap:13px}
aside::-webkit-scrollbar{width:4px}
aside::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
.fg{display:flex;flex-direction:column;gap:6px}
.ft{font-size:12px;font-weight:700;color:var(--acc);text-transform:uppercase;
  letter-spacing:.1em;padding-bottom:4px;border-bottom:1px solid var(--b1)}
.fbs{display:flex;flex-wrap:wrap;gap:4px}
.fb{padding:4px 6px;border:1px solid var(--b2);background:var(--bg3);color:var(--tx2);
  border-radius:3px;cursor:pointer;font-size:13px;font-family:'Noto Sans TC',sans-serif;
  transition:all .13s;white-space:nowrap}
.fb:hover{border-color:var(--acc);color:var(--ac2)}
.fb.on{background:var(--acc);border-color:var(--ac2);color:#fff;font-weight:600}
.fb.onl.on{background:var(--lad);border-color:var(--la2)}
.fb.onnl.on{background:rgb(231,52,52);border-color:rgb(255,100,100)}
.fb.onv.on{background:var(--grn);border-color:var(--gr2)}

/* weapon sub hidden by default */
.wsub{display:none;flex-direction:column;gap:6px}
.wsub.show{display:flex}

/* ── RUNE FILTER CHIPS (fixed width) ── */
.rfc{display:flex;flex-wrap:wrap;gap:3px}
/* fixed width = 3 CJK + # + 2 digits = ~70px at 13px; use min-width */
.rc{display:inline-flex;align-items:center;justify-content:center;
  width:72px;height:26px;
  background:var(--bg4);border:1px solid var(--b2);border-radius:3px;
  cursor:pointer;font-size:12px;color:var(--tx2);transition:all .13s;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc:hover{border-color:var(--run);color:var(--ru2)}
.rc.on{background:rgba(200,160,72,.2);border-color:var(--ru2);color:var(--ru2);font-weight:600}

/* ── RUNE SUMMARY ── */
.rsum{background:var(--bg3);border:1px solid var(--b1);border-radius:3px;
  padding:7px;display:flex;flex-direction:column;gap:3px;max-height:220px;overflow-y:auto}
.rsum::-webkit-scrollbar{width:3px}
.rsum::-webkit-scrollbar-thumb{background:var(--b2);border-radius:1px}
.rsr{display:flex;align-items:center;justify-content:space-between;padding:2px 0}
.rsn{font-size:13px;color:var(--tx2)}.rse{font-size:10px;color:var(--tx2)}
.rsc{font-size:13px;font-weight:700;color:var(--ru2);min-width:22px;text-align:right}

/* ── MAIN ── */
main{flex:1;overflow-y:auto;padding:13px}
main::-webkit-scrollbar{width:6px}
main::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
.ib{font-size:13px;color:var(--tx2);margin-bottom:11px;padding:6px 11px;
  background:var(--bg2);border:1px solid var(--b1);border-radius:3px}
.ib span{color:var(--ac2);font-weight:600}.ib .ra{color:var(--ru2);font-style:italic}
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(285px,1fr));gap:9px}

/* ── CARD ── */
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:5px;padding:12px;
  position:relative;overflow:hidden;transition:border-color .13s,box-shadow .13s}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--acc),var(--ac3));opacity:0;transition:opacity .13s}
.card:hover{border-color:var(--b2);box-shadow:var(--sh)}.card:hover::before{opacity:1}
.card.dn{background:var(--done-bg);border-color:var(--done-bd);opacity:.72}
.card.dn::before{background:var(--gr2);opacity:.6}
.card.ld::before{background:linear-gradient(90deg,var(--lad),var(--la2))}
.card.nld::before{background:linear-gradient(90deg,var(--nld),var(--nl2))}
.bnl{background:rgba(231,52,52,.15);border:1px solid rgba(231,52,52,.4);color:rgb(231,52,52)}

/* card header: title left, flag+ladder top-right */
.ch{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.ch-left{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.ch-left .zh{font-size:15px;font-weight:700;color:var(--ac2);line-height:1.2}
.bgs{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.ch-right{display:flex;align-items:center;gap:4px;flex-shrink:0}
.flag-btn{background:none;border:none;cursor:pointer;padding:1px;
  display:flex;align-items:center;justify-content:center;transition:transform .13s}
.flag-btn:hover{transform:scale(1.15)}
.flag-svg{width:20px;height:20px}
.bg{padding:2px 6px;border-radius:2px;font-size:10px;font-weight:600;white-space:nowrap}
.bs{background:var(--bg4);border:1px solid var(--b2);color:var(--tx2)}
.bt{background:rgba(74,120,200,.15);border:1px solid rgba(106,154,240,.25);color:var(--ac2)}
.bl{background:rgba(144,96,200,.2);border:1px solid rgba(184,136,240,.3);color:var(--la2)}

/* rune chips in card */
.rns{display:flex;flex-wrap:wrap;gap:4px}
.rn{display:flex;flex-direction:column;align-items:center;
  background:var(--bg4);border:1px solid var(--b2);border-radius:3px;
  padding:3px 6px;min-width:36px;transition:border-color .13s}
.rn.hl{border-color:var(--ru2);background:rgba(200,160,72,.12)}
.rn img{width:20px;height:20px;object-fit:contain;image-rendering:pixelated}
.rn .rz{font-size:14px;color:var(--tx2);margin-top:1px}
.rn .re{font-size:12px;color:var(--tx2)}
.rn .rnum{font-size:12px;color:var(--run);font-family:'Cinzel',serif}

.nores{text-align:center;padding:60px;color:var(--tx2);font-size:15px}

/* hidden file input */
#imp-file{display:none}

/* ── SIDEBAR SEARCH ── */
.sb-search{display:flex;align-items:center;gap:6px;background:var(--bg3);
  border:1px solid var(--b2);border-radius:3px;padding:5px 9px;transition:border-color .13s}
.sb-search:focus-within{border-color:var(--acc)}
.sb-search input{flex:1;background:none;border:none;outline:none;color:var(--tx);
  font-family:'Noto Sans TC',sans-serif;font-size:13px}
.sb-search input::placeholder{color:var(--tx2)}
.sb-search .si{color:var(--tx2);font-size:13px;flex-shrink:0}

/* ── TOGGLE BUTTONS ── */
.hbtn-tog{padding:5px 11px;border-radius:3px;cursor:pointer;font-size:13px;
  font-family:'Noto Sans TC',sans-serif;transition:all .13s;white-space:nowrap;
  background:var(--bg3);border:1px solid var(--b2);color:var(--tx2)}
.hbtn-tog:hover{border-color:var(--acc);color:var(--ac2)}
.hbtn-tog.active{background:var(--acc);border-color:var(--ac2);color:#fff}

/* ── LIGHT THEME ── */
body.light{
  --bg:#e0e9ff;--bg2:#f2f6ff;--bg3:#e8ecf4;--bg4:#dde2ee;
  --b1:#c0c8dc;--b2:#a8b4cc;
  --acc:#2a5aaa;--ac2:#1a4a9a;--ac3:#3a6aba;
  --tx:#1a2040;--tx2:#4a5878;--tx3:#2a3560;
  --red:#b03030;--grn:#2a6040;--gr2:#3a8058;
  --lad:#6040b0;--la2:#8060d0;
  --run:#8a6010;--ru2:#9a6808;
  --done-bg:#bae0c9;--done-bd:#5a9868;
  background-image:radial-gradient(ellipse at 10% 0%,rgba(42,90,170,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 90% 100%,rgba(58,106,186,.06) 0%,transparent 50%);
}
body.light header{background:linear-gradient(180deg,#e0e8f8 0%,var(--bg) 100%)}

/* ── COPYRIGHT ── */
.copyright{text-align:center;font-size:11px;color:var(--tx2);padding:14px 16px;
  border-top:1px solid var(--b1);line-height:1.7;margin-top:auto}
.copyright a{color:var(--acc);text-decoration:none}
.copyright a:hover{text-decoration:underline}

/* toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--b2);color:var(--tx);
  padding:10px 20px;border-radius:4px;font-size:14px;
  box-shadow:var(--sh);z-index:999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}

/* ── COLLAPSIBLE FG SECTIONS ── */
.ft-col{cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  user-select:none;gap:6px}
.ft-col:hover{color:var(--ac2)}
.ft-arrow{font-size:9px;transition:transform .2s ease;flex-shrink:0;opacity:.7}
.fg.collapsed .ft-arrow{transform:rotate(-90deg)}
.fg.collapsed .fg-body{display:none}

/* ── SIDEBAR BACKDROP ── */
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;
  backdrop-filter:blur(1px)}
.sb-backdrop.show{display:block}

/* ── SIDEBAR TOGGLE (header, mobile only) ── */
.sb-tog{display:none;background:var(--bg3);border:1px solid var(--b2);color:var(--ac2);
  padding:5px 10px;border-radius:3px;cursor:pointer;font-size:13px;
  font-family:'Noto Sans TC',sans-serif;white-space:nowrap}
.sb-tog:hover{background:var(--acc);color:#fff;border-color:var(--ac2)}

/* ── SIDEBAR CLOSE (mobile only) ── */
.sb-close{display:none;background:none;border:1px solid var(--b2);color:var(--tx2);
  border-radius:3px;padding:3px 10px;cursor:pointer;font-size:12px;
  font-family:'Noto Sans TC',sans-serif;align-self:flex-end}
.sb-close:hover{border-color:var(--acc);color:var(--ac2)}

/* ── MOBILE ── */
@media(max-width:767px){
  header{flex-wrap:wrap;padding:9px 11px;gap:7px;justify-content:center}
  h1{width:100%;text-align:center;font-size:18px;order:-2}
  .dv{display:none}
  .stats{width:100%;justify-content:center;order:-1;gap:20px}
  .hbtn{font-size:12px;padding:5px 9px}
  .rst{margin-left:0}
  .sb-tog{display:inline-flex;align-items:center;gap:4px}

  .sb-close{display:flex}
  .sb-backdrop.show{display:block}

  .wrap{position:relative}
  aside{
    position:fixed;top:0;right:0;bottom:0;
    width:min(300px,88vw);
    z-index:200;
    transform:translateX(110%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    border-right:none;border-left:1px solid var(--b2);
    box-shadow:-4px 0 24px rgba(0,0,0,.5);
    padding-top:10px;
  }
  aside.open{transform:translateX(0)}

  main{padding:10px 8px}
  .cards{grid-template-columns:1fr}
  .card{padding:10px}
}
</style>

// FILTER
// ═══════════════════════════════════════════════
const MT=new Set(['swords','daggers','axes','polearms','spears','clubs','maces','hammers','scepters','staves','orbs','wands','katars']);
const MS=new Set(['bows','crossbows']);

function match(rw){
  const {cat,wt,soc,lad,view,rune}=F;
  if(cat!=='all'&&rw.cat!==cat)return false;
  if(cat==='weapons'&&wt!=='all'){
    const w=rw.wt||[];
    if(wt==='melee'){
      if(!w.some(x=>MT.has(x))&&!w.includes('melee'))return false;
    } else if(wt==='missile'){
      if(!w.some(x=>MS.has(x))&&!w.includes('missile'))return false;
    } else if(MS.has(wt)){
      if(!w.includes(wt)&&!w.includes('missile'))return false;
    } else {
      if(!w.includes(wt)&&!w.includes('melee'))return false;
    }
  }
  if(soc!=='all'&&rw.s!==parseInt(soc))return false;
  if(cat==='weapons'&&wt!=='all'&&wt!=='melee'&&wt!=='missile'){
    const maxS={daggers:3,katars:3,orbs:3,clubs:3,wands:2,maces:5,scepters:5}[wt]||6;
    if(rw.s>maxS)return false;
  }
  if(lad==='true'&&!rw.lad)return false;
  if(lad==='true'&&rw.lad==='nonlad')return false;
  if(lad==='nonlad'&&rw.lad!=='nonlad')return false;
  const done=!!DN[rw.id];
  if(view==='done'&&!done)return false;
  if(view==='undone'&&done)return false;
  if(rune&&!rw.runes.map(r=>r.toLowerCase()).includes(rune.toLowerCase()))return false;
  // search filter
  if(SEARCH_Q){
    const q=SEARCH_Q.toLowerCase();
    const zhName=rw.zh.toLowerCase();
    const cnName=(rw.cn||'').toLowerCase();
    const enName=rwEnName(rw.id).toLowerCase();
    if(!zhName.includes(q)&&!cnName.includes(q)&&!enName.includes(q))return false;
  }
  return true;
}

function sf(key,val,btn){
  F[key]=val;
  const g=btn.closest('.fbs');
  g.querySelectorAll('.fb').forEach(b=>{
    b.classList.remove('on');
  });
  btn.classList.add('on');

  if(key==='cat'){
    const ws=document.getElementById('wsub');
    val==='weapons'?ws.classList.add('show'):ws.classList.remove('show');
    if(val!=='weapons'){
      F.wt='all';
      document.querySelectorAll('#wt-g .fb').forEach((b,i)=>b.classList.toggle('on',i===0));
    }
    updateSocBtns();
  }
  if(key==='wt'){
    updateSocBtns();
  }
  render();
}

// 每種武器類型的最大孔數
const WT_MAX_SOC={
  daggers:3, katars:3, orbs:3, clubs:3,
  wands:2,
  maces:5, scepters:5,
  swords:6, axes:6, polearms:6, spears:6, hammers:6, staves:6, bows:6, crossbows:6,
  melee:6, missile:6, all:6
};

function updateSocBtns(){
  const cat=F.cat;
  const wt=F.wt;
  // 計算當前最大孔數
  let maxSoc=6;
  if(cat==='helms')maxSoc=3;
  else if(cat==='armors')maxSoc=4;
  else if(cat==='shields')maxSoc=4;
  else if(cat==='weapons'){
    maxSoc=WT_MAX_SOC[wt]||6;
  }
  document.querySelectorAll('#soc-g .fb').forEach(b=>{
    const v=b.dataset.v;
    if(v==='all'){b.style.display='';return;}
    const n=parseInt(v);
    const hide=n>maxSoc;
    b.style.display=hide?'none':'';
    if(hide&&b.classList.contains('on')){
      b.classList.remove('on');
      document.querySelector('#soc-g .fb').classList.add('on');
      F.soc='all';
    }
  });
}

function setRune(en){
  F.rune=F.rune===en?null:en;

}

function render(){
  const vis=RW.filter(match);
  // Linked pair secondaries — don't count these toward total
  const PAIR_SECONDARY=new Set(['Dragon_s','Phoenix_s','Spirit_sh','Dream_s','Fortitude_a']);
  const totalCount=RW.filter(r=>!PAIR_SECONDARY.has(r.id)).length;
  const totalDone=Object.keys(DN).filter(id=>RW.find(r=>r.id===id)&&!PAIR_SECONDARY.has(id)).length;
  document.getElementById('sv').textContent=totalCount;
  document.getElementById('sd').textContent=totalDone;
  document.getElementById('sn').textContent=totalCount-totalDone;
  document.getElementById('cards').innerHTML=vis.length
    ?vis.map(cardHTML).join('')
    :'<div class="nores">😔 沒有符合條件的符文之語</div>';
  renderSum();
}

function renderSum(){
  const PAIR_SECONDARY=new Set(['Dragon_s','Phoenix_s','Spirit_sh','Dream_s','Fortitude_a']);
  const undone=RW.filter(r=>!DN[r.id]&&!PAIR_SECONDARY.has(r.id));
  const cnt={};
  undone.forEach(rw=>rw.runes.forEach(r=>{cnt[r]=(cnt[r]||0)+1;}));
  const need=RUNES.filter(r=>cnt[r.id]>0);
  const el=document.getElementById('rsum');
  if(!need.length){
    el.innerHTML='<div style="color:var(--gr2);font-size:13px;text-align:center">🎉 全部完成！</div>';
    return;
  }
  el.innerHTML=need.map(r=>
    `<div class="rsr">
      <div><span class="rsn">${LANG==='zh-CN'?(r.cn||r.zh):r.zh}</span> <span class="rse">#${r.n}</span></div>
      <span class="rsc">${cnt[r.id]}</span>
    </div>`
  ).join('');
}

// Cross-category linked pairs (completing one completes the other)
const LINKED_PAIRS={
  'Dragon_a':'Dragon_s','Dragon_s':'Dragon_a',
  'Phoenix_w':'Phoenix_s','Phoenix_s':'Phoenix_w',
  'Spirit_sw':'Spirit_sh','Spirit_sh':'Spirit_sw',
  'Dream_h':'Dream_s','Dream_s':'Dream_h',
  'Fortitude_w':'Fortitude_a','Fortitude_a':'Fortitude_w',
};

function tog(id){
  if(DN[id])delete DN[id];else DN[id]=true;
  // sync linked pair
  const pair=LINKED_PAIRS[id];
  if(pair){
    if(DN[id])DN[pair]=true;else delete DN[pair];
  }
  save();render();
}

// EXPORT / IMPORT
// ═══════════════════════════════════════════════
function doExport(){
  const PAIR_SECONDARY=new Set(['Dragon_s','Phoenix_s','Spirit_sh','Dream_s','Fortitude_a']);
  const undone=RW.filter(r=>!DN[r.id]&&!PAIR_SECONDARY.has(r.id));
  const cnt={};
  undone.forEach(rw=>rw.runes.forEach(r=>{cnt[r]=(cnt[r]||0)+1;}));
  const needRunes=RUNES.filter(r=>cnt[r.id]>0);

  const totalCount=RW.filter(r=>!PAIR_SECONDARY.has(r.id)).length;
  let t='══════════════════════════════════════\n';
  t+='   D2R 符文之語進度報告\n';
  t+='══════════════════════════════════════\n';
  t+=`匯出時間：${new Date().toLocaleString('zh-TW')}\n`;
  t+=`進度：已完成 ${totalCount-undone.length} / ${totalCount}\n\n`;

  t+='── 剩餘符文組 ──────────────────────\n';
  t+=`尚有 ${undone.length} 個符文之語未完成\n\n`;

  t+='── 尚需符文統計 ────────────────────\n';
  needRunes.forEach(r=>{
    t+=`${r.zh}（#${r.n}）  ×${cnt[r.id]}\n`;
  });

  t+='\n── 未完成符文之語 ──────────────────\n';
  undone.forEach(r=>{
    const runeStr=r.runes.map(id=>{const x=RM[id];return x?`${x.zh}(#${x.n})`:id;}).join(' + ');
    t+=`○ ${r.zh}  [${r.s}S]  ${runeStr}\n`;
  });

  // embed JSON data at the BOTTOM for reimport
  const jsonData={version:2,done:DN,exported:new Date().toISOString()};
  t+='\n══════════════════════════════════════\n';
  t+='   以下為進度備份資料，匯入時請勿修改此行\n';
  t+='══════════════════════════════════════\n';
  t+=`##D2R_PROGRESS##${JSON.stringify(jsonData)}##END##\n`;

  const blob=new Blob([t],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`d2r_進度_${new Date().toISOString().slice(0,10)}.txt`;
  a.click();
  toast('已匯出 .txt（含進度資料，可重新匯入）');
}

function doImport(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const text=e.target.result;
      // Try reading embedded JSON marker first (txt format)
      const marker=text.match(/##D2R_PROGRESS##(.+?)##END##/);
      if(marker){
        const data=JSON.parse(marker[1]);
        if(data.done&&typeof data.done==='object'){
          DN=data.done;save();render();
          toast(`✅ 匯入成功！已完成 ${Object.keys(DN).length} 個符文之語`);
          input.value='';return;
        }
      }
      // Fallback: try parsing as raw JSON
      const data=JSON.parse(text);
      if(data.done&&typeof data.done==='object'){
        DN=data.done;save();render();
        toast(`✅ 匯入成功！已完成 ${Object.keys(DN).length} 個符文之語`);
      }else{
        toast('❌ 格式錯誤，請匯入正確的進度檔');
      }
    }catch(err){
      toast('❌ 無法讀取檔案，請確認為正確的進度檔（.txt 或 .json）');
    }
    input.value='';
  };
  reader.readAsText(file);
}

function doReset(){
  if(!confirm('確定要清除所有進度？此操作無法復原。'))return;
  DN={};save();render();
  toast('已清除所有進度');
}

let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3000);
}

// SIDEBAR (mobile)
// ═══════════════════════════════════════════════
function openSidebar(){
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sb-backdrop').classList.add('show');
  document.body.style.overflow='hidden';
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sb-backdrop').classList.remove('show');
  document.body.style.overflow='';
}
function toggleSidebar(){
  const sb=document.getElementById('sidebar');
  sb.classList.contains('open')?closeSidebar():openSidebar();
}

// ═══════════════════════════════════════════════
// COLLAPSIBLE SECTIONS
// ═══════════════════════════════════════════════
function toggleFg(id){
  document.getElementById(id).classList.toggle('collapsed');
}
function initCollapsible(){
  const mobile=window.innerWidth<768;
  // 符文篩選 & 尚需符文：手機預設收納，PC預設展開
  ['fg-rune','fg-rsum'].forEach(id=>{
    const el=document.getElementById(id);
    if(el){mobile?el.classList.add('collapsed'):el.classList.remove('collapsed');}
  });
}
window.addEventListener('resize',()=>{
  // 視窗放大回 PC 時若 sidebar 是疊加模式就收起
  if(window.innerWidth>=768)closeSidebar();
});

// ── SEARCH ──
function onSearch(val){
  SEARCH_Q=val.trim();
  document.getElementById('sb-search-clear').style.display=val?'':'none';
  render();
}
function clearSearch(){
  SEARCH_Q='';
  document.getElementById('sb-search-input').value='';
  document.getElementById('sb-search-clear').style.display='none';
  render();
}

// ── LANG TOGGLE ──
function toggleLang(){
  LANG=LANG==='zh-TW'?'zh-CN':'zh-TW';
  const btn=document.getElementById('lang-tog');
  if(LANG==='zh-CN'){
    document.documentElement.lang='zh-CN';
    btn.textContent='繁';
    btn.classList.add('active');
    applyLang();
  } else {
    document.documentElement.lang='zh-TW';
    btn.textContent='簡';
    btn.classList.remove('active');
    applyLang();
  }
}
function applyLang(){
  // Re-render cards
  render();
  // Update static sidebar text labels
  if(LANG==='zh-CN'){
    document.querySelectorAll('[data-zh]').forEach(el=>{
      el.textContent=toSimple(el.getAttribute('data-zh'));
    });
  } else {
    document.querySelectorAll('[data-zh]').forEach(el=>{
      el.textContent=el.getAttribute('data-zh');
    });
  }
}

// ── THEME TOGGLE ──
function toggleTheme(){
  const isLight=document.body.classList.toggle('light');
  const btn=document.getElementById('theme-tog');
  if(isLight){
    btn.textContent='⬛';
    btn.classList.add('active');
  } else {
    btn.textContent='⬜';
    btn.classList.remove('active');
  }
  localStorage.setItem('d2r_theme',isLight?'light':'dark');
}
function loadTheme(){
  const t=localStorage.getItem('d2r_theme');
  if(t==='light'){
    document.body.classList.add('light');
    const btn=document.getElementById('theme-tog');
    if(btn){btn.textContent='⬛';btn.classList.add('active');}
  }
}
